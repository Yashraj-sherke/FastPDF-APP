# Project-wide Gradle settings.

# Use Android Studio's bundled JDK 21 (system JDK 25 is incompatible with Gradle 8.5)
org.gradle.java.home=C:\\Program Files\\Android\\Android Studio\\jbr

# Performance: Parallel builds + daemon
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.daemon=true

# AndroidX
android.useAndroidX=true

# Non-transitive R classes for faster builds
android.nonTransitiveRClass=true

# Kotlin code style
kotlin.code.style=official

# Disable Jetifier (not needed for new projects)
android.enableJetifier=false
